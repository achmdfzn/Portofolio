<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Inisial AF dalam lingkaran tangan">
  <!-- Background paper -->
  <rect width="64" height="64" fill="#f4f0eb" />

  <!-- Lingkaran tangan kasar -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#1c1c1c" stroke-width="3" />
  <circle cx="33" cy="31" r="26" fill="none" stroke="#1c1c1c" stroke-width="1" stroke-dasharray="3 5" opacity="0.5" />

  <!-- Highlighter kuas di belakang inisial -->
  <rect x="18" y="26" width="28" height="16" fill="#ffd700" opacity="0.6" />

  <!-- Inisial AF -->
  <text x="32" y="42" font-family="'Comic Sans MS', cursive, sans-serif" font-size="24" font-weight="bold" fill="#1c1c1c" text-anchor="middle">AF</text>
</svg>
